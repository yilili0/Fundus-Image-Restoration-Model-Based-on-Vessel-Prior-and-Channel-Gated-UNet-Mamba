# Config aligned with the original notebook (U-Net + DiceBCE)
seed: 42

input:
  height: 512
  width: 512

data:
  # Update these globs to your local dataset structure.
  # Notebook assumed data already stored as image/* and mask/*.
  train_images_glob: "Data/train/image/*"
  train_masks_glob: "Data/train/mask/*"
  valid_images_glob: "Data/test/image/*"
  valid_masks_glob: "Data/test/mask/*"
  test_images_glob:  "Data/test/image/*"
  test_masks_glob:  "Data/test/mask/*"

paths:
  checkpoint_dir: "files"
  checkpoint_path: "files/checkpoint.pth"
  results_dir: "results"

train:
  batch_size: 2
  lr: 1e-4
  num_epochs: 50
  num_workers: 2
  pin_memory: true

  # Notebook defines ReduceLROnPlateau but never steps it.
  # Keep default false to match the notebook.
  use_scheduler: false
  lr_patience: 5
